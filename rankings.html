<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRX | MASTER RANKINGS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .clan-toggle {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .toggle-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: #666;
            padding: 10px 30px;
            cursor: pointer;
            font-family: 'Orbitron';
            transition: 0.3s;
        }

        .toggle-btn.active {
            border-color: var(--main-blue);
            color: white;
            box-shadow: 0 0 15px var(--main-blue);
        }

        /* Hide Clan 2 by default */
        #clan2-list { display: none; }

        .role-tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 3px;
            margin-left: 10px;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <nav>
    <div class="brand">{ 龙 } FRX FRACTURE</div>
    <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="nav-links">
        <a href="index.html">HOME</a>
        <a href="rankings.html">RANKINGS</a>
        <a href="join.html">JOIN</a>
        <a href="contact.html">CONTACT</a>
        <a href="wars.html">WAR RECORDS</a>
    </div>
</nav>
    <section style="padding: 100px 5%;">
        <h2 class="section-title">CLAN HIERARCHY</h2>

        <div class="clan-toggle">
            <button class="toggle-btn active" onclick="showClan(1)">CLAN 1 (ELITE)</button>
            <button class="toggle-btn" onclick="showClan(2)">CLAN 2 (ACADEMY)</button>
        </div>

        <div id="clan1-list" class="rank-grid">
            <div class="player-card tier-gold">
                <div class="rank-badge">#1</div>
                <img src="geory.jpg" class="player-img">
                <div class="player-info">
                    <h3 class="player-name">龙 GEORY <span class="role-tag">CLAN 1</span></h3>
                    <div class="stats-row">
                        <div class="stat-box"><span class="stat-val">13,155</span><span class="stat-label">Points</span></div>
                        <div class="stat-box"><span class="stat-val">LEGEND II</span><span class="stat-label">Tier</span></div>
                    </div>
                </div>
            </div>
            <div class="player-card tier-gold">
                <div class="rank-badge">#2</div>
                <img src="zandex.jpg" class="player-img">
                <div class="player-info">
                    <h3 class="player-name">龙 ZanDex <span class="role-tag" style="color: gold;">LEADER</span></h3>
                    <div class="stats-row">
                        <div class="stat-box"><span class="stat-val">11,290</span><span class="stat-label">Points</span></div>
                        <div class="stat-box"><span class="stat-val">LEGEND IV</span><span class="stat-label">Tier</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="clan2-list" class="rank-grid">
            <div class="player-card" style="border-color: #00f2ff;">
                <div class="rank-badge" style="background: #00f2ff; color: black;">#1</div>
                <img src="eminoon.jpg" class="player-img">
                <div class="player-info">
                    <h3 class="player-name">EmiNoon <span class="role-tag">CLAN 2</span></h3>
                    <div class="stats-row">
                        <div class="stat-box"><span class="stat-val">7,958</span><span class="stat-label">Points</span></div>
                        <div class="stat-box"><span class="stat-val" style="color: #00f2ff;">DIAMOND I</span><span class="stat-label">Tier</span></div>
                    </div>
                </div>
            </div>
            <div class="player-card" style="border-color: #00f2ff;">
                <div class="rank-badge" style="background: #00f2ff; color: black;">#2</div>
                <img src="emvictor.jpg" class="player-img">
                <div class="player-info">
                    <h3 class="player-name">EM·VICTOR <span class="role-tag">CLAN 2</span></h3>
                    <div class="stats-row">
                        <div class="stat-box"><span class="stat-val">6,878</span><span class="stat-label">Points</span></div>
                        <div class="stat-box"><span class="stat-val">DIAMOND II</span><span class="stat-label">Tier</span></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function showClan(num) {
            const c1 = document.getElementById('clan1-list');
            const c2 = document.getElementById('clan2-list');
            const btns = document.querySelectorAll('.toggle-btn');
            
            if(num === 1) {
                c1.style.display = 'grid';
                c2.style.display = 'none';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                c1.style.display = 'none';
                c2.style.display = 'grid';
                btns[1].classList.add('active');
                btns[0].classList.remove('active');
            }
        }
    </script>
</body>
</html>
