<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRX | CLAN WARS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Stats Dashboard at the Top */
        .war-stats-header {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
            text-align: center;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .stat-number { display: block; font-family: 'Orbitron'; font-size: 2rem; color: var(--main-blue); }
        .stat-desc { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        /* War Card Mobile Fixes */
        .war-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            text-align: center;
            flex-wrap: wrap; /* Allows wrapping on small phones */
            gap: 20px;
        }

        .team-box img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--main-blue); object-fit: cover; }
        .score { font-family: 'Orbitron'; font-size: 2.5rem; color: #fff; margin: 0 10px; }
        .vs-text { color: var(--main-blue); font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 1px; }
        .win-tag { color: #4ade80; font-weight: bold; font-size: 12px; display: block; margin-top: 5px; }
        .loss-tag { color: #f87171; font-weight: bold; font-size: 12px; display: block; margin-top: 5px; }

        @media (max-width: 600px) {
            .score { font-size: 1.8rem; }
            .team-box img { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="brand"><span>龙</span> FRX FRACTURE</div>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="leaderboard.html">LEADERBOARD</a>
            <a href="wars.html" class="active">WAR RECORDS</a>
            <a href="join.html">JOIN US</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </nav>

    <section style="padding: 120px 5% 50px;">
        <h2 class="section-title">WAR RECORD</h2>
        
        <div class="war-stats-header">
            <div class="stat-card">
                <span class="stat-number">15</span>
                <span class="stat-desc">Total Wins</span>
            </div>
            <div class="stat-card">
                <span class="stat-number">2</span>
                <span class="stat-desc">Total Losses</span>
            </div>
            <div class="stat-card">
                <span class="stat-number">88%</span>
                <span class="stat-desc">Win Rate</span>
            </div>
        </div>

        <h3 style="font-family: 'Orbitron'; margin-bottom: 20px; font-size: 14px; color: #444;">RECENT ENGAGEMENTS</h3>

        <div class="war-card">
            <div class="team-box">
                <img src="logo-c1.jpg" alt="Clan 1">
                <h4 style="margin-top:10px; font-size: 14px;">FRX CLAN 1</h4>
                <span class="win-tag">WINNER</span>
            </div>

            <div class="score-box">
                <div class="vs-text">INTERNAL SCRIM</div>
                <div class="score">4 - 1</div>
                <div style="font-size: 10px; color: #444;">FEB 21, 2026</div>
            </div>

            <div class="team-box">
                <img src="logo-c2.jpg" alt="Clan 2">
                <h4 style="margin-top:10px; font-size: 14px;">FRX CLAN 2</h4>
                <span class="loss-tag">DEFEAT</span>
            </div>
        </div>

        <div class="war-card" style="border-left: 5px solid #ff4d4d;">
            <div class="team-box">
                <img src="logo-c1.jpg" alt="Clan 1">
                <h4 style="margin-top:10px; font-size: 14px;">FRX ELITE</h4>
            </div>

            <div class="score-box">
                <div class="vs-text" style="color: #ff4d4d;">EXTERNAL WAR</div>
                <div class="score">10 - 0</div>
                <div style="font-size: 10px; color: #444;">FEB 15, 2026</div>
            </div>

            <div class="team-box">
                <img src="enemy-logo.jpg" alt="Enemy Clan">
                <h4 style="margin-top:10px; font-size: 14px;">TEAM X</h4>
                <span class="loss-tag">FLAWLESS VICTORY</span>
            </div>
        </div>

    </section>

    <script>
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
