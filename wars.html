<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRX | WAR RECORDS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    
    <style>
        .war-stats-header {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border-light);
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-number { display: block; font-family: 'Orbitron'; font-size: 2.2rem; color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
        .stat-desc { font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }

        .war-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            transition: 0.3s;
        }
        .war-card:hover { border-color: var(--neon-blue); background: rgba(0, 242, 255, 0.02); }
        
        /* Win/Loss Styles */
        .war-card.win { border-left: 5px solid #25d366; }
        .war-card.loss { border-left: 5px solid #ff0050; }

        .team-box { flex: 1; min-width: 120px; text-align: center; }
        .team-box img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); object-fit: cover; margin-bottom: 10px; }
        
        .score-box { flex: 1; min-width: 150px; text-align: center; }
        .score { font-family: 'Orbitron'; font-size: 2.8rem; color: #fff; line-height: 1; margin: 10px 0; letter-spacing: -2px; }
        .vs-text { color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.6rem; letter-spacing: 3px; }
        
        .status-label { font-size: 0.65rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; padding: 4px 12px; border-radius: 4px; }
        .status-win { background: rgba(37, 211, 102, 0.1); color: #25d366; }
        .status-loss { background: rgba(255, 0, 80, 0.1); color: #ff0050; }

        @media (max-width: 600px) {
            .score { font-size: 2rem; }
            .war-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="brand"><span>龙</span> FRX FRACTURE</div>
        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="index.html">HOME</a>
            <a href="leaderboard.html">LEADERBOARD</a>
            <a href="wars.html" class="active">WAR RECORDS</a>
            <a href="join.html">JOIN US</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </nav>

    <section style="padding: 120px 5% 50px; max-width: 1000px; margin: 0 auto;">
        <h2 class="section-title">WAR HISTORY</h2>
        
        <div id="war-stats-container" class="war-stats-header"></div>

        <h3 style="font-family: 'Orbitron'; margin-bottom: 25px; font-size: 0.7rem; color: #555; letter-spacing: 2px;">RECENT ENGAGEMENTS</h3>

        <div id="war-cards-container"></div>
    </section>

    <script src="war-data.js"></script>
    <script>
        function toggleMenu() { document.getElementById('navLinks').classList.toggle('active'); }
    </script>
</body>
</html>
