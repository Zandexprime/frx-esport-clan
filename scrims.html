<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRX | SCRIM HUB</title>
     <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="stylesheet" href="scrim-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-bg"></div>
    <div class="vignette"></div>

    <div class="dashboard-wrapper">
        <header class="main-header">
            <h1 class="massive-title">FRX<span>SCRIMS</span></h1>
            <div id="status-mount"></div>
        </header>

        <div class="focus-grid">
            <aside class="panel side">
                <div class="glass-card" id="js-slots"></div>
                <div class="glass-card" id="js-info"></div>
                <div class="glass-card" id="js-rules"></div>
                <div class="glass-card" id="js-banned-guns"></div>
                <div class="glass-card signup-mini">
                    <div class="tag">SCRIM</div>
                    <button class="btn primary full" onclick="location.href='register.html'">RESERVE SLOT</button>
                    <button class="btn secondary full" onclick="location.href='signup.html'">SIGN UP</button>
                </div>
            </aside>

            <main class="center-content">
                <div class="glass-card news-feed-card">
                    <div class="tag center-tag">CENTRAL_NEWS_FEED</div>
                    <div class="news-scroll" id="js-news-feed">
                        </div>
                </div>
            </main>

            <aside class="panel side">
                
                <div class="glass-card leaderboard">
                    <div class="tag">SCRIM LEADERBOARD</div>
                    <table>
                        <thead><tr><th>CLAN</th><th>W</th><th>K</th></tr></thead>
                        <tbody id="js-board"></tbody>
                    </table>
                </div>
                <div class="glass-card" id="js-blacklist"></div>
            </aside>
        </div>
    </div>

    <footer class="slim-footer" id="js-footer"></footer>
<div class="admin-trigger" onclick="toggleAdmin()">⚙️</div>

<div id="admin-panel" class="admin-overlay">
    <div class="glass-card admin-box">
        <div class="tag">ADMIN ACCESS</div>
        
        <div id="login-section">
            <input type="password" id="admin-pass" placeholder="ENTER ACCESS CODE">
            <button class="btn primary full" onclick="checkAuth()">UNLOCK</button>
            <button class="btn secondary full" style="margin-top: 10px; opacity: 0.6;" onclick="toggleAdmin()">CANCEL</button>
        </div>

        <div id="controls-section" style="display:none; max-height: 80vh; overflow-y: auto; padding-right: 10px;">
            <div class="tag">LIVE HUB CONTROL</div>
            
            <label>Scrim Status</label>
            <select id="edit-online" onchange="updateLive()">
                <option value="true">ONLINE</option>
                <option value="false">OFFLINE</option>
            </select>

            <label>Current Slots</label>
            <input type="number" id="edit-slots" oninput="updateLive()">

            <label>Intel (Mode)</label>
            <input type="text" id="edit-mode" oninput="updateLive()">

            <div style="margin-top: 20px; padding: 12px; background: rgba(0,242,255,0.05); border-radius: 15px; border: 1px solid rgba(0,242,255,0.1);">
                <label style="color: var(--neon); margin-top: 0;">POST NEW UPDATE</label>
                <input type="text" id="new-news-title" placeholder="News Title...">
                <textarea id="new-news-body" placeholder="Update details..." style="height: 50px;"></textarea>
                <button class="btn primary full" style="margin-top: 10px; font-size: 0.7rem;" onclick="postNews()">SEND TO HUB</button>
            </div>

            <label>Manage Live News</label>
            <div id="js-admin-news-list" class="news-manage-list">
                </div>

            <label>Footer Ticker</label>
            <textarea id="edit-footer-news" oninput="updateLive()"></textarea>

            <div class="admin-actions">
                <label>Danger Zone</label>
                <div id="clear-container">
                    <button class="btn secondary full" id="clear-btn" onclick="armClear()">CLEAR LEADERBOARD</button>
                </div>
            </div>

            <button class="btn secondary full" style="margin-top: 20px;" onclick="toggleAdmin()">CLOSE PANEL</button>
        </div>
    </div>
</div>
<div id="custom-alert">
    <h2>ACCESS DENIED</h2>
    <p>INVALID SECURITY PROTOCOL DETECTED.</p>
    <button class="btn secondary" onclick="closeAlert()">TRY AGAIN</button>
</div>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script src="scrim-logic.js"></script>
</body>
</html>
